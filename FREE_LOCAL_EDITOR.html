<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Local AI Code Editor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #1e1e1e;
      color: #f8fafc;
      font-family: Arial, sans-serif;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 44px 1fr 26px;
    }

    header,
    footer {
      background: #181818;
      border-bottom: 1px solid #3e3e3e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 13px;
    }

    footer {
      border-top: 1px solid #3e3e3e;
      border-bottom: 0;
      background: #007acc;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr) minmax(320px, 42vw);
    }

    .sidebar,
    .agent,
    .editor-wrap,
    .preview-wrap {
      min-height: 0;
      border-right: 1px solid #3e3e3e;
      background: #252526;
    }

    .agent {
      border-right: 0;
      border-left: 1px solid #3e3e3e;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .panel-title {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-bottom: 1px solid #3e3e3e;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      color: #cbd5e1;
    }

    .files {
      padding: 8px;
      overflow: auto;
    }

    .file {
      width: 100%;
      border: 0;
      background: transparent;
      color: #d1d5db;
      text-align: left;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .file.active,
    .file:hover {
      background: #37373d;
      color: white;
    }

    .editor-wrap {
      display: grid;
      grid-template-rows: 36px minmax(0, 1fr);
      background: #1e1e1e;
    }

    .tabs {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #3e3e3e;
      background: #252526;
      padding: 0 10px;
      font-size: 13px;
      color: #cbd5e1;
    }

    #editor {
      width: 100%;
      height: 100%;
      resize: none;
      border: 0;
      outline: 0;
      padding: 14px;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: Consolas, Monaco, monospace;
      font-size: 14px;
      line-height: 1.5;
      tab-size: 2;
    }

    .preview-wrap {
      display: grid;
      grid-template-rows: 36px minmax(0, 1fr);
      background: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    .agent-form {
      padding: 10px;
      border-bottom: 1px solid #3e3e3e;
    }

    .agent-form textarea {
      width: 100%;
      height: 92px;
      resize: none;
      border: 1px solid #3e3e3e;
      border-radius: 8px;
      outline: 0;
      padding: 9px;
      background: #1e1e1e;
      color: white;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .primary,
    .ghost {
      border: 0;
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      color: white;
      font-size: 13px;
    }

    .primary {
      background: #0891b2;
      flex: 1;
    }

    .ghost {
      background: #333;
    }

    .quick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid #3e3e3e;
    }

    .quick button {
      border: 1px solid #3e3e3e;
      background: #1e1e1e;
      color: #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      text-align: left;
      cursor: pointer;
      font-size: 12px;
    }

    .plan {
      overflow: auto;
      padding: 10px;
      font-size: 13px;
    }

    .card {
      border: 1px solid #3e3e3e;
      border-radius: 8px;
      padding: 10px;
      background: #1e1e1e;
      margin-bottom: 10px;
    }

    .muted {
      color: #9ca3af;
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .main {
        grid-template-columns: 180px minmax(0, 1fr);
      }

      .agent {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <strong>Free Local AI Code Editor</strong>
      <span>No npm, no API key, ready now</span>
    </header>

    <div class="main">
      <aside class="sidebar">
        <div class="panel-title">
          Explorer
          <button class="ghost" onclick="downloadActive()">Download</button>
        </div>
        <div id="files" class="files"></div>
      </aside>

      <section class="editor-wrap">
        <div id="activeTab" class="tabs">index.html</div>
        <textarea id="editor" spellcheck="false"></textarea>
      </section>

      <section class="preview-wrap">
        <div class="panel-title">
          Live Preview
          <button class="ghost" onclick="refreshPreview()">Refresh</button>
        </div>
        <iframe id="preview" title="Live Preview"></iframe>
      </section>

      <aside class="agent">
        <div class="panel-title">Free Coding Agent</div>

        <div class="agent-form">
          <textarea id="prompt" placeholder="Ask: create a todo app, create a calculator, create a landing page..."></textarea>
          <div class="row">
            <button class="primary" onclick="runAgent()">Generate Plan</button>
            <button class="ghost" onclick="applyPlan()">Apply</button>
          </div>
        </div>

        <div class="quick">
          <button onclick="setPrompt('create a modern landing page')">Landing page</button>
          <button onclick="setPrompt('create a todo app')">Todo app</button>
          <button onclick="setPrompt('create a calculator')">Calculator</button>
          <button onclick="setPrompt('improve the active file')">Improve file</button>
        </div>

        <div id="plan" class="plan">
          <div class="card">
            <strong>Ready</strong>
            <p class="muted">Generate a plan, review changed files, then apply.</p>
          </div>
        </div>
      </aside>
    </div>

    <footer>
      <span id="status">Ready</span>
      <span>Free local mode</span>
    </footer>
  </div>

  <script>
    const files = {
      "index.html": `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Hello World</h1>
    <p>Use the free local agent to build.</p>
    <button onclick="sayHello()">Click me</button>
  </main>
  <script src="script.js"><\/script>
</body>
</html>`,
      "style.css": `body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: Arial, sans-serif;
  background: #111827;
  color: white;
}

.app {
  width: min(92vw, 680px);
  padding: 40px;
  border-radius: 24px;
  background: #172033;
}

button {
  border: 0;
  border-radius: 12px;
  padding: 12px 18px;
  background: #38bdf8;
  font-weight: 800;
}`,
      "script.js": `function sayHello() {
  alert("Free local editor is ready.");
}`
    };

    let activeFile = "index.html";
    let pendingPlan = [];

    const editor = document.getElementById("editor");
    const filesEl = document.getElementById("files");
    const activeTab = document.getElementById("activeTab");
    const statusEl = document.getElementById("status");
    const planEl = document.getElementById("plan");

    function renderFiles() {
      filesEl.innerHTML = Object.keys(files).map((name) => {
        return `<button class="file ${name === activeFile ? "active" : ""}" onclick="openFile('${name}')">${name}</button>`;
      }).join("");
    }

    function openFile(name) {
      files[activeFile] = editor.value;
      activeFile = name;
      editor.value = files[name];
      activeTab.textContent = name;
      renderFiles();
    }

    function refreshPreview() {
      files[activeFile] = editor.value;
      const html = files["index.html"] || "";
      const css = files["style.css"] || "";
      const js = files["script.js"] || "";
      document.getElementById("preview").srcdoc = `<!DOCTYPE html>
<html>
<head><style>${css}</style></head>
<body>
${html.replace(/<script[^>]*>.*?<\/script>/gis, "")}
<script>
try { ${js} } catch (error) {
  document.body.innerHTML += '<pre style="color:red;background:#111;padding:12px;">' + error + '</pre>';
}
<\/script>
</body>
</html>`;
      statusEl.textContent = "Preview refreshed";
    }

    function setPrompt(text) {
      document.getElementById("prompt").value = text;
    }

    function makeLanding(task) {
      return {
        "index.html": `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav><strong>Launch Page</strong><button onclick="scrollToSignup()">Start</button></nav>
  <main class="hero">
    <p class="badge">Generated locally</p>
    <h1>${escapeHtml(task).slice(0, 80) || "Build faster."}</h1>
    <p>A polished starter built without paid APIs.</p>
    <button onclick="scrollToSignup()">Get Started</button>
  </main>
  <section class="cards">
    <article><h2>Fast</h2><p>Clean code and instant preview.</p></article>
    <article><h2>Free</h2><p>No API key required.</p></article>
    <article><h2>Ready</h2><p>Edit and export anytime.</p></article>
  </section>
  <form id="signup" onsubmit="handleSignup(event)">
    <h2>Join the list</h2>
    <input id="email" type="email" placeholder="you@example.com" required />
    <button>Notify me</button>
    <p id="message"></p>
  </form>
  <script src="script.js"><\/script>
</body>
</html>`,
        "style.css": `body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1020;
  color: white;
}

nav {
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 7vw;
  border-bottom: 1px solid rgba(255,255,255,.1);
}

button {
  border: 0;
  border-radius: 12px;
  padding: 12px 18px;
  background: #38bdf8;
  color: #082f49;
  font-weight: 800;
}

.hero {
  min-height: 58vh;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 70px 7vw;
}

.badge {
  color: #67e8f9;
}

h1 {
  max-width: 880px;
  font-size: clamp(3rem, 8vw, 6rem);
  line-height: .95;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  padding: 0 7vw 60px;
}

article,
form {
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.06);
  border-radius: 18px;
  padding: 24px;
}

form {
  margin: 0 7vw 40px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.18);
  background: #111827;
  color: white;
}

@media (max-width: 760px) {
  .cards { grid-template-columns: 1fr; }
}`,
        "script.js": `function scrollToSignup() {
  document.getElementById("signup").scrollIntoView({ behavior: "smooth" });
}

function handleSignup(event) {
  event.preventDefault();
  document.getElementById("message").textContent = "You are on the list.";
}`
      };
    }

    function makeTodo() {
      return {
        "index.html": `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Todo App</h1>
    <form id="form"><input id="input" placeholder="Add a task..." /><button>Add</button></form>
    <ul id="list"></ul>
  </main>
  <script src="script.js"><\/script>
</body>
</html>`,
        "style.css": `body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #111827;
  color: white;
  font-family: Arial, sans-serif;
}
.app { width: min(92vw, 460px); background: #172033; padding: 28px; border-radius: 22px; }
form { display: flex; gap: 10px; }
input { flex: 1; padding: 12px; border-radius: 10px; border: 0; }
button { border: 0; border-radius: 10px; padding: 12px 16px; background: #22c55e; color: white; }
li { list-style: none; margin-top: 10px; background: #0f172a; padding: 12px; border-radius: 10px; cursor: pointer; }
ul { padding: 0; }`,
        "script.js": `const form = document.getElementById("form");
const input = document.getElementById("input");
const list = document.getElementById("list");
let todos = JSON.parse(localStorage.getItem("todos") || "[]");
function save(){ localStorage.setItem("todos", JSON.stringify(todos)); }
function render(){
  list.innerHTML = "";
  todos.forEach((todo, index) => {
    const li = document.createElement("li");
    li.textContent = todo;
    li.onclick = () => { todos.splice(index, 1); save(); render(); };
    list.appendChild(li);
  });
}
form.onsubmit = (event) => {
  event.preventDefault();
  if (!input.value.trim()) return;
  todos.unshift(input.value.trim());
  input.value = "";
  save();
  render();
};
render();`
      };
    }

    function makeCalculator() {
      return {
        "index.html": `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator">
    <input id="display" readonly />
    <div class="keys">
      <button onclick="clearDisplay()">C</button><button onclick="appendValue('/')">/</button><button onclick="appendValue('*')">*</button><button onclick="backspace()">DEL</button>
      <button onclick="appendValue('7')">7</button><button onclick="appendValue('8')">8</button><button onclick="appendValue('9')">9</button><button onclick="appendValue('-')">-</button>
      <button onclick="appendValue('4')">4</button><button onclick="appendValue('5')">5</button><button onclick="appendValue('6')">6</button><button onclick="appendValue('+')">+</button>
      <button onclick="appendValue('1')">1</button><button onclick="appendValue('2')">2</button><button onclick="appendValue('3')">3</button><button onclick="calculate()">=</button>
      <button class="zero" onclick="appendValue('0')">0</button><button onclick="appendValue('.')">.</button>
    </div>
  </main>
  <script src="script.js"><\/script>
</body>
</html>`,
        "style.css": `body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; font-family: Arial, sans-serif; }
.calculator { width: min(92vw, 360px); background: #020617; padding: 22px; border-radius: 24px; }
#display { width: 100%; height: 68px; margin-bottom: 14px; border: 0; border-radius: 16px; background: #1e293b; color: white; font-size: 2rem; text-align: right; padding: 0 16px; }
.keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
button { height: 56px; border: 0; border-radius: 14px; background: #334155; color: white; font-weight: 800; }
.zero { grid-column: span 2; }`,
        "script.js": `const display = document.getElementById("display");
function appendValue(value){ display.value += value; }
function clearDisplay(){ display.value = ""; }
function backspace(){ display.value = display.value.slice(0, -1); }
function calculate(){
  const allowed = new RegExp("^[0-9+\\\\-*/. ()]+$");
  if (!allowed.test(display.value)) { display.value = "Error"; return; }
  try { display.value = Function('"use strict"; return (' + display.value + ')')(); }
  catch { display.value = "Error"; }
}`
      };
    }

    function runAgent() {
      files[activeFile] = editor.value;
      const prompt = document.getElementById("prompt").value.trim();
      const lower = prompt.toLowerCase();
      let generated;
      if (lower.includes("todo")) generated = makeTodo();
      else if (lower.includes("calculator") || lower.includes("calc")) generated = makeCalculator();
      else if (lower.includes("landing") || lower.includes("website") || lower.includes("portfolio")) generated = makeLanding(prompt);
      else generated = { [activeFile]: files[activeFile] + "\\n\\n/* Local agent note: " + prompt.replace(/\\*\\//g, "* /") + " */" };

      pendingPlan = Object.entries(generated).map(([name, content]) => ({ name, content }));
      planEl.innerHTML = `<div class="card"><strong>Plan ready</strong><p class="muted">${pendingPlan.length} file change(s). Review and click Apply.</p></div>` +
        pendingPlan.map((item) => `<div class="card"><strong>${item.name}</strong><p class="muted">${item.content.split("\\n").length} lines</p></div>`).join("");
      statusEl.textContent = "Plan ready";
    }

    function applyPlan() {
      pendingPlan.forEach((item) => {
        files[item.name] = item.content;
      });
      if (pendingPlan[0]) activeFile = pendingPlan[0].name;
      pendingPlan = [];
      editor.value = files[activeFile];
      activeTab.textContent = activeFile;
      renderFiles();
      refreshPreview();
      planEl.innerHTML = '<div class="card"><strong>Applied</strong><p class="muted">Changes are now in the editor.</p></div>';
      statusEl.textContent = "Applied";
    }

    function downloadActive() {
      files[activeFile] = editor.value;
      const blob = new Blob([files[activeFile]], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = activeFile;
      link.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    editor.addEventListener("input", () => {
      files[activeFile] = editor.value;
      refreshPreview();
    });

    renderFiles();
    openFile("index.html");
    refreshPreview();
  </script>
</body>
</html>
